<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=0, viewport-fit=cover" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="BaChan TPV" />

    <title>BaChan ERP 2.0</title>

    <!-- App Version & Forced Cache Busting Script -->
    <script>
      (function() {
        const CURRENT_VERSION = '2.3.9';
        const savedVersion = localStorage.getItem('bachan_app_version');
        
        if (savedVersion && savedVersion !== CURRENT_VERSION) {
          console.log('🚀 Nueva versión detectada (' + CURRENT_VERSION + ') - Limpiando caché...');
          localStorage.setItem('bachan_app_version', CURRENT_VERSION);
          // Forzar recarga completa saltando caché
          window.location.reload(true);
        } else {
          localStorage.setItem('bachan_app_version', CURRENT_VERSION);
        }
      })();
    </script>

  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
