<!DOCTYPE html>
<html>

<head>
    <base target="_top">
    <meta charset="utf-8">
    <meta name="viewport"
        content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="icon" type="image/png" href="https://lh3.googleusercontent.com/d/14q-a9OMOQaHgjQ_Q-hMWM0e7UDA7YskL">
    <link rel="apple-touch-icon" href="https://lh3.googleusercontent.com/d/14q-a9OMOQaHgjQ_Q-hMWM0e7UDA7YskL">
    <style>
        :root {
            --color-brand: #3d2b1f;
            /* Brown */
            --color-accent: #c5a076;
            /* Kraft */
            --color-bg: #f9f7f2;
            /* Lino */
            --color-surface: rgba(255, 255, 255, 0.85);
            --glass-blur: blur(10px);
            --shadow-soft: 0 8px 32px rgba(61, 43, 31, 0.1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: 'Montserrat', sans-serif;
            background-color: var(--color-bg);
            color: var(--color-brand);
            height: 100vh;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        /* Pattern Background */
        .bg-pattern {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            opacity: 0.05;
            background-image:
                radial-gradient(circle at 10px 10px, var(--color-brand) 11px, transparent 12px),
                radial-gradient(circle at 10px 10px, var(--color-bg) 9px, transparent 10px);
            background-size: 20px 20px;
            background-position: 0 0, 10px 10px;
        }

        /* Navigation / Header */
        header {
            padding: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: var(--color-surface);
            backdrop-filter: var(--glass-blur);
            border-bottom: 2px solid var(--color-accent);
            z-index: 10;
        }

        .logo {
            height: 60px;
            object-fit: contain;
        }

        /* Content Area */
        main {
            flex: 1;
            padding: 20px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .card {
            background: var(--color-surface);
            backdrop-filter: var(--glass-blur);
            border-radius: 20px;
            padding: 20px;
            box-shadow: var(--shadow-soft);
            border: 1px solid rgba(197, 160, 118, 0.2);
            transition: transform 0.2s;
        }

        .card:active {
            transform: scale(0.98);
        }

        .card h2 {
            font-size: 16px;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 10px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .price-tag {
            font-size: 24px;
            font-weight: 700;
            color: var(--color-accent);
        }

        /* Floating AI Button */
        .assistant-fab {
            position: fixed;
            bottom: 30px;
            right: 30px;
            width: 65px;
            height: 65px;
            background: var(--color-brand);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 10px 40px rgba(61, 43, 31, 0.3);
            cursor: pointer;
            z-index: 100;
            border: 3px solid var(--color-accent);
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .assistant-fab:active {
            transform: scale(0.9) rotate(-10deg);
        }

        .assistant-fab i {
            font-size: 28px;
            color: #fff;
        }

        .assistant-fab.listening {
            background: var(--color-accent);
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse {
            0% {
                box-shadow: 0 0 0 0 rgba(197, 160, 118, 0.7);
            }

            70% {
                box-shadow: 0 0 0 20px rgba(197, 160, 118, 0);
            }

            100% {
                box-shadow: 0 0 0 0 rgba(197, 160, 118, 0);
            }
        }

        /* Assistant Overlay */
        #assistantOverlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(61, 43, 31, 0.95);
            z-index: 200;
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 40px;
            color: #fff;
            text-align: center;
        }

        .bachan-logo {
            width: 120px;
            margin-bottom: 20px;
            filter: drop-shadow(0 0 10px var(--color-accent));
        }

        .listening-text {
            font-size: 18px;
            font-weight: 600;
            margin-bottom: 40px;
            letter-spacing: 2px;
        }

        .ai-response {
            font-size: 16px;
            line-height: 1.5;
            max-width: 300px;
            padding: 20px;
            border-radius: 15px;
            background: rgba(197, 160, 118, 0.1);
            border: 1px solid var(--color-accent);
            margin-bottom: 20px;
        }

        .input-group {
            display: flex;
            width: 100%;
            max-width: 400px;
            gap: 10px;
            margin-top: 20px;
        }

        .input-group input {
            flex: 1;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.3);
            border-radius: 25px;
            padding: 12px 20px;
            color: #fff;
            outline: none;
            font-family: inherit;
        }

        .input-group input:focus {
            border-color: var(--color-accent);
            background: rgba(255, 255, 255, 0.15);
        }

        .input-group button {
            background: var(--color-accent);
            border: none;
            color: #fff;
            padding: 0 20px;
            border-radius: 25px;
            font-weight: bold;
            cursor: pointer;
        }
    </style>
</head>

<body>
    <div class="bg-pattern"></div>

    <header>
        <img src="https://lh3.googleusercontent.com/d/14q-a9OMOQaHgjQ_Q-hMWM0e7UDA7YskL" class="logo" alt="BaChan Logo">
    </header>

    <main id="app">
        <div class="card">
            <h2>📊 Resumen</h2>
            <div id="stats">Cargando datos...</div>
        </div>

        <div class="card">
            <h2>🍱 Insumos</h2>
            <div id="insumosList">
                <p style="opacity:0.6">Toca el botón BACHAN para gestionar ingredientes con voz</p>
            </div>
        </div>
    </main>

    <div class="assistant-fab" id="fab">
        <span style="color:white; font-size: 24px; font-weight: bold;">🎎</span>
    </div>

    <div id="assistantOverlay">
        <img src="https://lh3.googleusercontent.com/d/14q-a9OMOQaHgjQ_Q-hMWM0e7UDA7YskL" class="bachan-logo">
        <div class="listening-text" id="statusText">¿Dime BACHAN...?</div>
        <div class="ai-response" id="aiResponse" style="display:none"></div>

        <div class="input-group">
            <input type="text" id="manualInput" placeholder="Escribe aquí tu comando...">
            <button onclick="sendManualCommand()">Enviar</button>
        </div>

        <button onclick="closeAssistant()"
            style="margin-top:40px; background:none; border: 1px solid rgba(255,255,255,0.3); color:rgba(255,255,255,0.6); padding: 8px 16px; border-radius: 20px; font-size: 12px;">Cerrar</button>
    </div>

    <script>
        const fab = document.getElementById('fab');
        const overlay = document.getElementById('assistantOverlay');
        const responseBox = document.getElementById('aiResponse');
        const statusText = document.getElementById('statusText');
        const manualInput = document.getElementById('manualInput');

        fab.addEventListener('click', startListening);

        manualInput.addEventListener('keypress', function (e) {
            if (e.key === 'Enter') sendManualCommand();
        });

        function sendManualCommand() {
            const text = manualInput.value.trim();
            if (!text) return;
            manualInput.value = '';
            statusText.innerText = "PROCESANDO / 処理中...";
            responseBox.style.display = 'none';
            processCommand(text);
        }

        async function startListening() {
            overlay.style.display = 'flex';
            statusText.innerText = "SOLICITANDO MICRO...";
            responseBox.style.display = 'none';

            // 1. Intentar forzar el permiso del navegador explícitamente usando getUserMedia
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                // Si tenemos éxito, cerramos el stream de inmediato; solo queríamos el permiso.
                stream.getTracks().forEach(track => track.stop());
            } catch (err) {
                console.error("Error al pedir permiso:", err);
                statusText.innerText = "PERMISO DENEGADO";
                return; // El campo de texto ya está visible para escribir como alternativa
            }

            statusText.innerText = "ESCUCHANDO...";
            const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;

            if (SpeechRecognition) {
                const recognition = new SpeechRecognition();
                recognition.lang = 'es-ES';

                recognition.onresult = (event) => {
                    const transcript = event.results[0][0].transcript;
                    statusText.innerText = "PROCESANDO / 処理中...";
                    processCommand(transcript);
                };

                recognition.onerror = (event) => {
                    let msg = "Error al escuchar";
                    if (event.error === 'not-allowed') msg = "Permiso de micro denegado";
                    if (event.error === 'no-speech') msg = "No se detectó voz";

                    statusText.innerText = msg;
                    console.error("SpeechRecognition error: " + event.error);
                };

                try {
                    recognition.start();
                } catch (e) {
                    statusText.innerText = "Error al iniciar micro";
                }
            } else {
                statusText.innerText = "Voz no admitida";
            }
        }

        function processCommand(text) {
            google.script.run
                .withSuccessHandler((res) => {
                    statusText.innerText = "BACHAN DICE:";
                    responseBox.innerText = res.message;
                    responseBox.style.display = 'block';
                })
                .processAssistantCommand(text);
        }

        function closeAssistant() {
            overlay.style.display = 'none';
        }

        // Load initial data
        window.onload = () => {
            google.script.run
                .withSuccessHandler((data) => {
                    const stats = document.getElementById('stats');
                    stats.innerHTML = `<p>Total Insumos: <b>${data.length}</b></p>`;
                })
                .getInsumosData();
        };
    </script>
</body>

</html>
